  - paragraph [ref=e6]:
    - text: This tutorial walks you through installing the
    - code [ref=e7]: xml
    - text: "CLI and running four operations: validating a document against an XSD schema, linting and formatting XML, evaluating an XPath expression, and explaining a cryptic validation error. By the end, you will have the tool installed and understand the common command patterns that every other command builds on."
  - heading "Install" [level=2] [ref=e8]
  - paragraph [ref=e9]: "Build from source (requires Go 1.22+):"
  - code [ref=e11]:
    - generic [ref=e13]: go install github.com/go-go-golems/xml/cmd/xml@latest
  - paragraph [ref=e14]: "Verify the installation:"
  - code [ref=e16]:
    - generic [ref=e18]: xml version
    - generic [ref=e20]: "# xml version 0.1.0-dev"
  - paragraph [ref=e21]:
    - text: If you see a version string, the tool is ready. If not, check that
    - code [ref=e22]: $GOPATH/bin
    - text: or
    - code [ref=e23]: $HOME/go/bin
    - text: is on your
    - code [ref=e24]: PATH
    - text: .
  - 'heading "Step 1: Create a test document" [level=2] [ref=e25]'
  - paragraph [ref=e26]:
    - text: Save this as
    - code [ref=e27]: book.xml
    - text: ":"
  - code [ref=e29]:
    - generic [ref=e31]: <?xml version="1.0"?>
    - generic [ref=e33]: <book>
    - generic [ref=e35]: <title>XML Toolkit</title>
