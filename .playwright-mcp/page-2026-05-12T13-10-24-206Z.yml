    - generic [ref=e41]: </book>
  - 'heading "Step 2: Validate against an XSD schema" [level=2] [ref=e42]'
  - paragraph [ref=e43]:
    - text: Save this as
    - code [ref=e44]: book.xsd
    - text: ":"
  - code [ref=e46]:
    - generic [ref=e48]: <?xml version="1.0"?>
    - generic [ref=e50]: <xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema">
    - generic [ref=e52]: <xs:element name="book">
    - generic [ref=e54]: <xs:complexType>
    - generic [ref=e56]: <xs:sequence>
    - generic [ref=e58]: <xs:element name="title" type="xs:string"/>
    - generic [ref=e60]: <xs:element name="author" type="xs:string"/>
    - generic [ref=e62]: <xs:element name="price" type="xs:decimal"/>
    - generic [ref=e64]: </xs:sequence>
    - generic [ref=e66]: </xs:complexType>
    - generic [ref=e68]: </xs:element>
    - generic [ref=e70]: </xs:schema>
  - paragraph [ref=e71]: "Run validation:"
  - code [ref=e73]:
    - generic [ref=e75]: xml validate book.xml --xsd book.xsd
  - paragraph [ref=e76]:
    - text: For a valid document, the command exits with code 0 and produces no error output. For an invalid document — say, if you remove the
    - code [ref=e77]: <title>
    - text: element — the command prints the error and exits with code 1.
  - paragraph [ref=e78]: "Change the output format to JSON to see the structured result:"
  - code [ref=e80]:
    - generic [ref=e82]: xml validate book.xml --xsd book.xsd --output json
  - paragraph [ref=e83]:
    - text: The JSON output shows one row per error, with fields for the file, line, error code, and message. This format works well for piping into
    - code [ref=e84]: jq
    - text: or other downstream tools.
  - 'heading "Step 3: Lint and format" [level=2] [ref=e85]'
  - paragraph [ref=e86]:
    - text: The
    - code [ref=e87]: lint
    - text: command parses an XML document and re-serializes it. With the
    - code [ref=e88]: "--format"
    - text: "flag, it pretty-prints:"
  - code [ref=e90]:
    - generic [ref=e92]: xml lint book.xml --format
  - paragraph [ref=e93]: "Output:"
  - code [ref=e95]:
    - generic [ref=e97]: <?xml version="1.0"?>
    - generic [ref=e99]: <book>
    - generic [ref=e101]: <title>XML Toolkit</title>
    - generic [ref=e103]: <author>Developer</author>
    - generic [ref=e105]: <price>29.99</price>
    - generic [ref=e107]: </book>
  - paragraph [ref=e108]:
    - text: The
    - code [ref=e109]: lint
    - text: command also supports canonicalization (
    - code [ref=e110]: "--c14n"
    - text: ), XInclude processing (
    - code [ref=e111]: "--xinclude"
    - text: ), and DTD validation (
    - code [ref=e112]: "--valid"
    - text: ). These are the same operations that
    - code [ref=e113]: xmllint
    - text: provides, but with structured output.
  - 'heading "Step 4: Evaluate XPath" [level=2] [ref=e114]'
  - paragraph [ref=e115]: "Find all element names in the document:"
  - code [ref=e117]:
    - generic [ref=e119]: xml xpath book.xml --expr "//*/local-name()"
  - paragraph [ref=e120]: "Or select specific elements:"
  - code [ref=e122]:
    - generic [ref=e124]: xml xpath book.xml --expr "//book/title" --output json
  - paragraph [ref=e125]:
    - text: The XPath command supports both XPath 1.0 (the default) and XPath 3.1 (with
    - code [ref=e126]: "--xpath3"
    - text: ). XPath 3.1 provides additional functions like
    - code [ref=e127]: array
    - text: ","
    - code [ref=e128]: map
    - text: ", and"
    - code [ref=e129]: sort
    - text: that are not available in XPath 1.0.
  - 'heading "Step 5: Explain a validation error" [level=2] [ref=e130]'
  - paragraph [ref=e131]:
    - text: When validation fails, the error output includes a W3C error code like
    - code [ref=e132]: cvc-complex-type.2.4.a
    - text: . These codes are precise but not human-readable. The
    - code [ref=e133]: explain-error
    - text: "command translates them:"
  - code [ref=e135]:
    - generic [ref=e137]: xml explain-error --code cvc-complex-type.2.4.a
  - paragraph [ref=e138]: Output includes the code, a plain-English explanation, likely causes, and suggested follow-up commands.
